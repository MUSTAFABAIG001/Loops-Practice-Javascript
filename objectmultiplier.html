<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object multiplier</title>
</head>
<body>
    
</body>
<script>
    let menu = {
  width: 200,
  height: 300,
  title: "My menu"
}; 
function multiplier(menu) 
{
    for(let key in menu)
    {   
        if(Number.isInteger(menu[key]))
        {
            menu[key]*=2;
        }

    }
}
multiplier(menu);
console.log(menu);

</script>

</html>
